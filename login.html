<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Firebase Auth</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
  <div id="login-form" class="bg-white p-6 rounded-xl shadow-blue-200 w-full max-w-sm">
    <h2 class="text-xl font-semibold mb-4 text-center">Login</h2>
    <input type="email" id="email" required class="w-full px-3 py-2 border rounded mb-4" placeholder="Email">
    <input type="password" id="password" required class="w-full px-3 py-2 border rounded mb-4" placeholder="Password">
    <button type="submit" id="login-btn" class="w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600">Login</button>
    <p id="message" class="text-center text-sm mt-2"></p>
    <p class="mt-3 text-center">Don't have an account? <a href="index.html" class="text-blue-500">Register</a></p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCnJnHVjuauCIvKJ8IwNombBM6L6bGpLa4",
      authDomain: "internet-data-selling.firebaseapp.com",
      projectId: "internet-data-selling",
      storageBucket: "internet-data-selling.firebasestorage.app",
      messagingSenderId: "661171379302",
      appId: "1:661171379302:web:45ee5b81504a15f6b861a7",
      measurementId: "G-1GF0Y8TYR5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = "index.html";
      }
    });

    document.getElementById('login-btn').addEventListener('click', () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      signInWithEmailAndPassword(auth, email, password)
        .then(() => {
          document.getElementById("message").innerHTML = "Login Successful!";
          window.location.href = "index.html";
        })
        .catch((error) => {
          document.getElementById("message").innerHTML = "Error: " + error.message;
        });
    });
  </script>
</body>
</html>
