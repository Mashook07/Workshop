<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password - Firebase Auth</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
  <div class="bg-white p-6 rounded-xl shadow-md w-full max-w-sm">
    <h2 class="text-xl font-semibold mb-4 text-center">Reset Password</h2>
    <p class="text-sm text-gray-500 mb-4 text-center">Enter your email to receive a password reset link.</p>
    <input type="email" id="email" required class="w-full px-3 py-2 border rounded mb-4" placeholder="Email">
    <button id="reset-btn" class="w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600">Send Reset Email</button>
    <p id="message" class="text-center text-sm mt-2"></p>
    <p class="mt-3 text-center text-sm"><a href="login.html" class="text-blue-500">Back to Login</a></p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCnJnHVjuauCIvKJ8IwNombBM6L6bGpLa4",
      authDomain: "internet-data-selling.firebaseapp.com",
      projectId: "internet-data-selling",
      storageBucket: "internet-data-selling.firebasestorage.app",
      messagingSenderId: "661171379302",
      appId: "1:661171379302:web:45ee5b81504a15f6b861a7",
      measurementId: "G-1GF0Y8TYR5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.getElementById('reset-btn').addEventListener('click', () => {
      const email = document.getElementById("email").value;
      sendPasswordResetEmail(auth, email)
        .then(() => {
          document.getElementById("message").innerHTML = "Reset email sent! Check your inbox.";
          document.getElementById("message").style.color = "green";
        })
        .catch((error) => {
          document.getElementById("message").innerHTML = "Error: " + error.message;
          document.getElementById("message").style.color = "red";
        });
    });
  </script>
</body>
</html>
